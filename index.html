<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: lightgray;
      text-align: center;
      margin: 0;
      padding: 2vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 2vh;
    }

    #display {
      width: min(350px, 90vw);
      height: min(80px, 15vw);
      font-size: min(30px, 6vw);
      text-align: right;
      margin-bottom: 2vh;
      padding: 0 1vw;
      border-radius: 5px;
      border: 1px solid lightgray;
    }

    .calculator {
      display: grid;
      grid-template-columns: repeat(4, min(80px, 20vw));
      grid-template-rows: repeat(6, min(80px, 20vw));
      gap: min(10px, 2vw);
      background: lightgray;
      padding: min(10px, 2vw);
      border-radius: 10px;
      justify-content: center;
    }

    button {
      background-color: gray;
      border-radius: min(15px, 2vw);
      font-size: min(20px, 4vw);
      color: black;
      text-align: center;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    button:hover {
      background-color: black;
      color: white;
      transform: scale(1.1);
    }

    .clear {
      grid-column: span 4;
    }
  </style>
  </head>
  <body>
      <h1>calculator 3.0</h1>
      <input id="display" type="text">
    <div class="calculator">
    <button class="symbols">√</button>
    <button class="symbols">**</button>
    <button class="symbols">%</button>
    <button class="backspace">⌫</button>
    <button class="number">7</button>
    <button class="number">8</button>
    <button class="number">9</button>
    <button class="symbols">/</button>
    <button class="number">4</button>
    <button class="number">5</button>
    <button class="number">6</button>
    <button class="symbols">*</button>
    <button class="number">1</button>
    <button class="number">2</button>
    <button class="number">3</button>
    <button class="symbols">-</button>
    <button class="number">0</button>
    <button class="symbols">.</button>
    <button class="equals">=</button>
    <button class="symbols">+</button>
    <button class="clear">C</button>
    </div>
    <script>
         const display = document.getElementById("display");
        document.querySelectorAll(".number").forEach(button => {
            button.addEventListener("click", () => {
            display.value += button.textContent;
    });
});
        document.querySelectorAll(".symbols").forEach(button =>{
           button.addEventListener("click",() => {
                if (button.textContent === "√") {
            display.value += "√(";
                }
           else{
               display.value += button.textContent;
           }
        });
        });
        
        document.querySelector(".equals").addEventListener("click", () => {
   let expression = display.value;
    expression = expression.replace(/√(\d+(\.\d+)?)/g, "Math.sqrt($1)");
    try{
display.value = eval(expression);
    }
    catch{
        display.value = "error";
    }
});

    document.querySelector(".clear").addEventListener("click", () => {
    display.value = "";
    });
document.querySelector(".backspace").addEventListener("click", () =>{
    display.value = display.value.slice(0, -1);
});
document.addEventListener("keydown", (e) => {
   const allowed = "012345+-*/.%"; 
   if(allowed.includes(e.key));
   if(e.key === "Enter")document.querySelector(".equals").click();
   if(e.key === "Backspace")document.querySelector(".backspace").click();
    if(e.key === "Escape")document.querySelector(".clear").click();
});
    </script>
</body>
</html>
